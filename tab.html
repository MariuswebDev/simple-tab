<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs</title>
    <link rel="stylesheet" href="tab.css">
</head>

<body>
    <div class="container">
        <div class="tab-buttons">
            <button class="tab-button active" data-tab="tab-1">First Tab</button>
            <button class="tab-button" data-tab="tab-2">Second Tab</button>
            <button class="tab-button" data-tab="tab-3">Third Tab</button>
            <button class="tab-button" data-tab="tab-4">Fourth Tab</button>
        </div>

        <div id="tab1" class="tab-content active">
            First Tab content to be displayed here.
        </div>
        <div id="tab1" class="tab-content">
            Second Tab content to be displayed here.
        </div>
        <div id="tab1" class="tab-content">
            Third Tab content to be displayed here.
        </div>
        <div id="tab1" class="tab-content">
            Fourth Tab content to be displayed here.
        </div>
    </div>
    <script src="tab.js"></script>
</body>

</html>
