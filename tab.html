<!DOCTYPE html>
<html>

<head>
    <title>Tab</title>
    <link rel="stylesheet" href="tab.css">
</head>

<body>
    <div class="container">
        <div class="tab-buttons">
            <button class="active" onclick="showTab(1)">Tab 1</button>
            <button onclick="showTab(2)">Tab 2</button>
            <button onclick="showTab(3)">Tab 3</button>
            <button onclick="showTab(4)">Tab 4</button>
        </div>

        <div id="content1" class="content show">Content 1 is displayed here.</div>
        <div id="content2" class="content">Content 2 is displayed here.</div>
        <div id="content3" class="content">Content 3 is displayed here.</div>
        <div id="content4" class="content">Content 4 is displayed here.</div>
    </div>
    <script src="tab.js"></script>
</body>

</html>
